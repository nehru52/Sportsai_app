<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compare — SportsAI</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .comp-container { max-width: 1200px; margin: 0 auto; padding: 120px 20px 60px; }
    .comp-header { display: grid; grid-template-columns: 1fr 100px 1fr; gap: 32px; align-items: center; margin-bottom: 48px; }
    .vs-circle { width: 64px; height: 64px; border-radius: 50%; background: var(--raised); border: 2px solid var(--red); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 900; margin: 0 auto; }
    
    .player-mini-card { background: var(--card); border: 1px solid var(--border); padding: 32px; border-radius: 14px; text-align: center; }
    .player-mini-card.winner { border-color: var(--green); box-shadow: 0 0 30px rgba(0,230,118,0.15); }
    
    .comp-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-bottom: 48px; }
    .comp-table tr { background: var(--card); }
    .comp-table td { padding: 18px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .comp-table td:first-child { border-left: 1px solid var(--border); border-radius: 12px 0 0 12px; text-align: center; width: 40%; }
    .comp-table td:nth-child(2) { text-align: center; width: 20%; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); background: var(--surface); }
    .comp-table td:last-child { border-right: 1px solid var(--border); border-radius: 0 12px 12px 0; text-align: center; width: 40%; }
    
    .win-cell { color: var(--green); font-weight: 800; }
    .loss-cell { color: var(--muted); }
    
    .adv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 48px; }
    .adv-card { background: var(--surface); padding: 24px; border-radius: 12px; border-left: 4px solid var(--red); }
    .adv-card.green { border-left-color: var(--green); }
    
    .rec-box { background: rgba(77,140,255,0.1); border: 1px solid var(--blue); padding: 24px; border-radius: 14px; margin-bottom: 48px; text-align: center; }
  </style>
</head>
<body>

<nav>
  <div class="logo">Sports<em>AI</em><sup>BETA</sup></div>
  <div class="nav-right">
    <a class="nav-pill" href="index.html">Dashboard</a>
    <a class="nav-pill" href="players.html">Players</a>
    <a class="nav-pill" href="match.html">Match Analysis</a>
    <a class="nav-pill active" href="compare.html">Compare</a>
  </div>
</nav>

<div class="comp-container">
  <div class="hero-eyebrow">⚔️ Head-to-Head</div>
  <h1 style="font-family: 'Barlow Condensed', sans-serif; font-size: 3rem; margin-bottom: 40px;">Athlete Comparison</h1>

  <div id="compContent">
    <div class="comp-header">
      <div id="cardA" class="player-mini-card">
        <div class="id-badge" id="idA">ID: —</div>
        <div class="score-large" id="scoreA">0</div>
        <div class="score-label">Overall Score</div>
      </div>
      <div class="vs-circle">VS</div>
      <div id="cardB" class="player-mini-card">
        <div class="id-badge" id="idB">ID: —</div>
        <div class="score-large" id="scoreB">0</div>
        <div class="score-label">Overall Score</div>
      </div>
    </div>

    <table class="comp-table" id="metricsTable">
      <!-- Rows generated by JS -->
    </table>

    <div class="adv-grid">
      <div class="adv-card" id="advA">
        <h3 style="font-family:'Barlow Condensed'; margin-bottom:12px;">Advantage A</h3>
        <ul id="listA" style="font-size:13px; color:var(--muted)"></ul>
      </div>
      <div class="adv-card green" id="advB">
        <h3 style="font-family:'Barlow Condensed'; margin-bottom:12px;">Advantage B</h3>
        <ul id="listB" style="font-size:13px; color:var(--muted)"></ul>
      </div>
    </div>

    <div class="rec-box">
      <h3 style="font-family:'Barlow Condensed'; margin-bottom:10px; color:var(--blue)">Recruiter Recommendation</h3>
      <p id="recommendationText" style="font-size:16px; font-weight:500;">—</p>
    </div>

    <div style="text-align:center;">
        <button class="btn btn-primary" onclick="downloadReport()">Download Comparison Report (.HTML)</button>
    </div>
  </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const idA = urlParams.get('a');
    const idB = urlParams.get('b');

    async function loadComparison() {
        if (!idA || !idB) return;
        try {
            const resp = await fetch(`http://localhost:8000/api/compare/${idA}/${idB}`);
            const data = await resp.json();
            renderComparison(data);
        } catch (e) { console.error(e); }
    }

    function renderComparison(data) {
        document.getElementById('idA').innerText = `ID: ${data.player_a}`;
        document.getElementById('idB').innerText = `ID: ${data.player_b}`;
        document.getElementById('scoreA').innerText = data.metrics.fivb_score.a;
        document.getElementById('scoreB').innerText = data.metrics.fivb_score.b;

        if (data.winner_overall === data.player_a) document.getElementById('cardA').classList.add('winner');
        if (data.winner_overall === data.player_b) document.getElementById('cardB').classList.add('winner');

        const table = document.getElementById('metricsTable');
        table.innerHTML = Object.entries(data.metrics).map(([label, m]) => `
            <tr>
                <td class="${m.winner === data.player_a ? 'win-cell' : 'loss-cell'}">${m.a}</td>
                <td>${label.replace(/_/g, ' ').toUpperCase()}</td>
                <td class="${m.winner === data.player_b ? 'win-cell' : 'loss-cell'}">${m.b}</td>
            </tr>
        `).join('');

        document.getElementById('advA').querySelector('h3').innerText = `Advantages for ${data.player_a}`;
        document.getElementById('advB').querySelector('h3').innerText = `Advantages for ${data.player_b}`;
        document.getElementById('listA').innerHTML = data.advantages_a.map(a => `<li>${a.replace(/_/g, ' ')}</li>`).join('') || '<li>None significant</li>';
        document.getElementById('listB').innerHTML = data.advantages_b.map(a => `<li>${a.replace(/_/g, ' ')}</li>`).join('') || '<li>None significant</li>';
        document.getElementById('recommendationText').innerText = data.recommendation;
    }

    function downloadReport() {
        window.open(`http://localhost:8000/api/reports/${idA}_vs_${idB}_report.html`, '_blank');
    }

    window.onload = loadComparison;
</script>
</body>
</html>
